; Local development defaults for the Software Compass Docker image.
; These are intentionally developer-friendly, not production-hardened.

display_errors = On
error_reporting = E_ALL
memory_limit = 256M
upload_max_filesize = 20M
post_max_size = 20M
date.timezone = UTC

opcache.enable = 1
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

