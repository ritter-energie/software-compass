name: Bug report
description: Report a problem with Software Compass
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Please provide clear steps to reproduce the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: PHP / Docker / browser version
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Please copy/paste any relevant log output (e.g. from `docker compose logs -f app`).

