name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare .env
        run: cp .env.example .env

      - name: Build and start containers
        run: |
          docker compose up -d --build || {
            docker compose ps
            docker compose logs --no-color
            exit 1
          }

      - name: Wait for app container
        run: docker compose exec -T app php -v

      - name: Install PHP dependencies
        run: docker compose exec -T app composer install --no-interaction --prefer-dist

      - name: Generate signing key
        run: docker compose exec -T app php tempest key:generate

      - name: Ensure isolated test database exists
        run: |
          docker compose exec -T mariadb sh -lc 'mariadb -uroot -p"$MARIADB_ROOT_PASSWORD" -e "CREATE DATABASE IF NOT EXISTS software_compass_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci; GRANT ALL PRIVILEGES ON software_compass_test.* TO \"$MARIADB_USER\"@\"%\"; FLUSH PRIVILEGES;"'

      - name: Run migrations
        run: docker compose exec -T app php tempest migrate:up --force

      - name: Run quality checks (format, tests, lint, static analysis)
        run: docker compose exec -T app composer qa

      - name: Tear down
        if: always()
        run: docker compose down -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build assets
        run: npm run build

